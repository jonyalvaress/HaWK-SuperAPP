name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: ZIP dosyasini ac
        run: |
          unzip -o hawk_project_firebase_studio_fixed.zip -d extracted
          ls -la extracted
          find extracted -maxdepth 3 -type f | head -100

      - name: Gradle wrapper bul ve yetki ver
        run: |
          GRADLEW_PATH=$(find extracted -name gradlew | head -n 1)
          echo "GRADLEW_PATH=$GRADLEW_PATH"
          chmod +x "$GRADLEW_PATH"

      - name: APK derle
        run: |
          GRADLEW_PATH=$(find extracted -name gradlew | head -n 1)
          PROJECT_DIR=$(dirname "$GRADLEW_PATH")
          echo "PROJECT_DIR=$PROJECT_DIR"
          cd "$PROJECT_DIR"
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: APK yukle
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: extracted/**/build/outputs/apk/debug/*.apk
